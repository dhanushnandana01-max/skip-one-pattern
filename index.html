<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>skip one pattern</title>
    <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="level-title">press a key to Start</h1>
    <h2 class="rule-title">Skip alternate colors!</h2>
    <div class="container">    
      <div class="row">
        <button id="red" class="btn red"></button>
          <button id="green" class="btn green"></button>
        </div>
       <div class="row">
            <button id="blue" class="btn blue"></button>
            <button id="yellow" class="btn yellow"></button>
        </div>
    </div>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="game.js" charset="utf-8"></script>
</body>
</html>
